# Developer Certificate of Origin (DCO) enforcement.
#
# Every commit in a pull request must carry a `Signed-off-by:` trailer whose
# email matches the commit author's — the contributor's certification that they
# have the right to submit the work (see DCO.md). Add it with `git commit -s`
# (or `git rebase --signoff` to backfill).
#
# Self-contained on purpose: no third-party action, no secrets, no repo writes.
# Runs on `pull_request` (not `pull_request_target`) with a read-only token, so
# it never needs elevated permissions. This is a normal status check; it is not
# a required check unless added to branch protection.
name: DCO

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify Signed-off-by on every commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          fail=0
          # --no-merges: merge commits carry no authored contribution to certify.
          for sha in $(git rev-list --no-merges "$BASE_SHA..$HEAD_SHA"); do
            author_email=$(git show -s --format='%ae' "$sha")
            author_name=$(git show -s --format='%an' "$sha")

            # Bot authors can't sign off; skip them.
            case "$author_email" in
              *"[bot]"*|*"bot@"*|*"noreply@github.com") continue ;;
            esac

            # Collect the emails from all Signed-off-by trailers on this commit.
            signoffs=$(git show -s --format='%B' "$sha" \
              | grep -iE '^Signed-off-by:' \
              | grep -oiE '<[^>]+>' | tr -d '<>' || true)

            if printf '%s\n' "$signoffs" | grep -qixF "$author_email"; then
              echo "ok   $sha  ($author_name <$author_email>)"
            else
              echo "FAIL $sha  ($author_name <$author_email>) — missing 'Signed-off-by: $author_name <$author_email>'"
              fail=1
            fi
          done

          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "DCO check failed. Sign off your commits so each certifies the DCO (DCO.md):"
            echo "  git commit -s            # for new commits"
            echo "  git rebase --signoff <base>  # to backfill existing commits, then force-push"
            exit 1
          fi
          echo ""
          echo "All commits are signed off. ✅"
