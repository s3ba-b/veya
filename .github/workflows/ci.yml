name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install native build/test dependencies
        # Single source of truth for native deps; the ci profile installs only
        # the GTK4/libadwaita runtime libs Gir.Core resolves at runtime (no
        # display server needed, ADR-0002) and assumes the SDK set up above.
        run: ./scripts/setup-dev.sh ci

      - name: Verify (build + test + format check)
        run: ./scripts/verify.sh
