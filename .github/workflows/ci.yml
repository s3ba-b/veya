name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install GTK4/libadwaita runtime libraries
        # Veya.Overlay's Gir.Core bindings resolve these at runtime; no
        # display server is needed to build and unit-test (ADR-0002).
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-1 libadwaita-1-0

      - name: Verify (build + test + format check)
        run: ./scripts/verify.sh
