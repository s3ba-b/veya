# Contributor License Agreement enforcement.
#
# Posts a comment on first-time contributors' pull requests asking them to sign
# the CLA (see CLA.md) by replying with the sign phrase below, and blocks the PR
# (status check) until they have. Signatures are recorded in
# signatures/version1/cla.json on the dedicated `cla-signatures` branch.
#
# The signature store lives on `cla-signatures` (not `main`) on purpose: `main`
# is branch-protected, so the action's GITHUB_TOKEN cannot commit to it. An
# unprotected branch keeps the store writable with the default token — no
# PERSONAL_ACCESS_TOKEN secret required. Keep `cla-signatures` unprotected.
#
# NOTE: pin `uses:` below to the latest release tag or commit SHA of
#   contributor-assistant/github-action before relying on this in production.
name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >
          (github.event.comment.body == 'recreate-signatures' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          # GITHUB_TOKEN is enough: signatures are stored on the unprotected
          # `cla-signatures` branch, so no PERSONAL_ACCESS_TOKEN is needed.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: signatures/version1/cla.json
          path-to-document: https://github.com/s3ba-b/veya/blob/main/CLA.md
          branch: cla-signatures
          # Maintainer and bots don't need to sign.
          allowlist: s3ba-b,dependabot[bot],github-actions[bot]
          custom-pr-sign-comment: I have read the CLA Document and I hereby sign the CLA
          custom-notsigned-prcomment: >
            Thank you for your contribution. Before we can merge it, please read
            our [Contributor License Agreement](https://github.com/s3ba-b/veya/blob/main/CLA.md)
            and sign it by posting the comment below in this pull request.
          custom-allsigned-prcomment: All contributors have signed the CLA. ✅
